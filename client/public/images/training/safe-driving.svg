<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <!-- background -->
  <rect width="800" height="450" fill="#faf8f5"/>
  <rect x="0" y="400" width="800" height="50" fill="#e8e2d8"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#b8ad9c" stroke-width="2"/>

  <text x="30" y="42" font-size="22" font-weight="700" fill="#4f3b3b">Safe Driving Position</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- ===== forklift, facing right ===== -->
  <!-- counterweight -->
  <path d="M150,350 L150,300 Q150,285 165,285 L230,285 L230,350 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- body -->
  <rect x="200" y="290" width="200" height="60" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- seat -->
  <rect x="248" y="238" width="54" height="14" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="240" y="196" width="13" height="48" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>

  <!-- ===== operator ===== -->
  <g>
    <!-- leg (thigh forward into footwell, behind hood) -->
    <path d="M292,238 L324,246 L330,282" fill="none" stroke="#3d3d3d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- torso: hi-vis vest -->
    <path d="M262,246 L262,208 Q262,196 274,196 L292,196 Q304,196 304,208 L304,246 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <!-- vest stripe -->
    <rect x="263" y="216" width="40" height="7" fill="#FFC326"/>
    <!-- arm to steering wheel -->
    <path d="M298,208 Q312,214 319,226" fill="none" stroke="#FF7F00" stroke-width="9" stroke-linecap="round"/>
    <circle cx="320" cy="228" r="4.5" fill="#e8b48e" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- neck + head -->
    <rect x="277" y="186" width="10" height="12" fill="#e8b48e" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="282" cy="177" r="13" fill="#e8b48e" stroke="#1a1a1a" stroke-width="2"/>
    <!-- hard hat -->
    <path d="M268,174 Q268,159 282,159 Q296,159 296,174 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="263" y="172" width="38" height="5" rx="2.5" fill="#FFC326" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- seat belt strap across torso -->
    <line x1="264" y1="244" x2="301" y2="201" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- hood / dash console (drawn after operator so leg tucks behind) -->
  <path d="M330,290 L330,255 Q330,248 337,248 L392,248 Q400,248 400,258 L400,290 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- steering wheel -->
  <path d="M340,250 L322,232" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="318" cy="228" r="9" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>

  <!-- data plate -->
  <rect x="352" y="298" width="30" height="22" rx="2" fill="#f5f2ec" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="356" y1="304" x2="378" y2="304" stroke="#8a8378" stroke-width="1.5"/>
  <line x1="356" y1="309" x2="378" y2="309" stroke="#8a8378" stroke-width="1.5"/>
  <line x1="356" y1="314" x2="372" y2="314" stroke="#8a8378" stroke-width="1.5"/>

  <!-- overhead guard -->
  <line x1="222" y1="290" x2="228" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
  <line x1="352" y1="252" x2="342" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
  <rect x="212" y="136" width="146" height="12" rx="5" fill="#3d3d3d"/>
  <g stroke="#3d3d3d" stroke-width="4">
    <line x1="242" y1="140" x2="242" y2="147"/>
    <line x1="268" y1="140" x2="268" y2="147"/>
    <line x1="294" y1="140" x2="294" y2="147"/>
    <line x1="320" y1="140" x2="320" y2="147"/>
  </g>

  <!-- wheels -->
  <circle cx="370" cy="352" r="48" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="370" cy="352" r="22" fill="#8a8378"/>
  <circle cx="370" cy="352" r="8" fill="#4a4540"/>
  <circle cx="212" cy="364" r="36" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="212" cy="364" r="16" fill="#8a8378"/>
  <circle cx="212" cy="364" r="6" fill="#4a4540"/>

  <!-- mast carriage link to chassis -->
  <rect x="398" y="300" width="38" height="26" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
  <!-- mast -->
  <rect x="432" y="118" width="13" height="274" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="455" y="118" width="13" height="274" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke="#1a1a1a" stroke-width="2" fill="#555">
    <rect x="432" y="150" width="36" height="8"/>
    <rect x="432" y="230" width="36" height="8"/>
    <rect x="432" y="310" width="36" height="8"/>
  </g>
  <!-- lift chain hint -->
  <line x1="474" y1="130" x2="474" y2="240" stroke="#8a8378" stroke-width="3" stroke-dasharray="4 3"/>

  <!-- load backrest, lowered -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="478" y="232" width="12" height="152" fill="#777"/>
    <line x1="478" y1="260" x2="490" y2="260"/>
    <line x1="478" y1="288" x2="490" y2="288"/>
    <line x1="478" y1="316" x2="490" y2="316"/>
    <line x1="478" y1="344" x2="490" y2="344"/>
  </g>

  <!-- forks carried low -->
  <path d="M490,266 L502,266 L502,372 L664,372 L664,384 L490,384 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>

  <!-- pallet + box load on forks -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="506" y="360" width="150" height="12" fill="#a6774e"/>
    <rect x="506" y="348" width="150" height="8" fill="#c09468"/>
    <rect x="512" y="356" width="14" height="4" fill="#8a6240" stroke="none"/>
    <rect x="574" y="356" width="14" height="4" fill="#8a6240" stroke="none"/>
    <rect x="636" y="356" width="14" height="4" fill="#8a6240" stroke="none"/>
    <rect x="524" y="292" width="114" height="56" fill="#c09468"/>
    <line x1="581" y1="292" x2="581" y2="348" stroke="#8a6240" stroke-width="2"/>
    <line x1="524" y1="312" x2="638" y2="312" stroke="#8a6240" stroke-width="2"/>
  </g>

  <!-- label: load low -->
  <line x1="596" y1="390" x2="520" y2="424" stroke="#4f3b3b" stroke-width="1.5"/>
  <circle cx="598" cy="389" r="3.5" fill="#FF7F00"/>
  <text x="512" y="440" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">Load low: 4-6 in above floor</text>

  <!-- sight line: look in direction of travel -->
  <line x1="302" y1="176" x2="606" y2="176" stroke="#019E7C" stroke-width="3" stroke-dasharray="8 6"/>
  <path d="M606,168 L626,176 L606,184 Z" fill="#019E7C"/>
  <rect x="424" y="188" width="196" height="22" fill="#faf8f5" opacity="0.9"/>
  <text x="522" y="204" font-size="15" font-weight="600" fill="#019E7C" text-anchor="middle">Look in direction of travel</text>

  <!-- label: seat belt fastened -->
  <line x1="276" y1="222" x2="204" y2="120" stroke="#4f3b3b" stroke-width="1.5"/>
  <circle cx="278" cy="225" r="3.5" fill="#FF7F00"/>
  <g>
    <circle cx="198" cy="112" r="12" fill="#019E7C"/>
    <path d="M192,112 L196,117 L204,107" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="182" y="117" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="end">Seat belt fastened</text>
  </g>

  <!-- speed limit sign -->
  <rect x="712" y="146" width="7" height="254" fill="#8a8378" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="715" cy="108" r="37" fill="#ffffff" stroke="#d64545" stroke-width="8"/>
  <text x="715" y="112" font-size="28" font-weight="700" fill="#1a1a1a" text-anchor="middle">5</text>
  <text x="715" y="130" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">MPH</text>
  <rect x="668" y="163" width="94" height="38" rx="4" fill="#faf8f5"/>
  <text x="715" y="178" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">Slow near</text>
  <text x="715" y="195" font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">pedestrians</text>
</svg>
