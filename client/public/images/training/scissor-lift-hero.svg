<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#4f3b3b"/>
  <rect x="50" y="50" width="700" height="300" fill="#5d4646" rx="12"/>
  <!-- Scissor lift silhouette -->
  <rect x="250" y="120" width="100" height="50" fill="#019E7C" rx="4"/>
  <!-- Scissor mechanism -->
  <line x1="270" y1="170" x2="330" y2="250" stroke="#FFC326" stroke-width="4"/>
  <line x1="330" y1="170" x2="270" y2="250" stroke="#FFC326" stroke-width="4"/>
  <line x1="270" y1="210" x2="330" y2="290" stroke="#FFC326" stroke-width="4"/>
  <line x1="330" y1="210" x2="270" y2="290" stroke="#FFC326" stroke-width="4"/>
  <!-- Base -->
  <rect x="240" y="290" width="120" height="30" fill="#FFC326" rx="4"/>
  <circle cx="265" cy="325" r="12" fill="#333"/>
  <circle cx="335" cy="325" r="12" fill="#333"/>
  <text x="450" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFC326">Scissor Lift Training</text>
  <text x="450" y="135" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">Group A MEWP - Vertical Elevation</text>
  <text x="450" y="165" font-family="Arial, sans-serif" font-size="14" fill="#cccccc">Pre-op inspection, fall protection, stability</text>
  <rect x="50" y="325" width="700" height="2" fill="#FFC326"/>
</svg>
