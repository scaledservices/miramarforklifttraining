<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <rect width="800" height="450" fill="#faf8f5"/>
  <rect x="0" y="400" width="800" height="50" fill="#e8e2d8"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#b8ad9c" stroke-width="2"/>

  <text x="30" y="44" font-size="22" font-weight="700" fill="#4f3b3b">Scissor Lift Components</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- chassis -->
  <rect x="285" y="342" width="230" height="42" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="293" y="368" width="214" height="10" rx="4" fill="#e0a800"/>

  <!-- pothole guards -->
  <rect x="362" y="384" width="34" height="14" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="408" y="384" width="34" height="14" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>

  <!-- wheels -->
  <circle cx="335" cy="376" r="24" fill="#1f1f1f" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="335" cy="376" r="8.5" fill="#8a8a8a" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="470" cy="376" r="24" fill="#1f1f1f" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="470" cy="376" r="8.5" fill="#8a8a8a" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- scissor arms: 3 X sections -->
  <g stroke="#1a1a1a" stroke-width="12" stroke-linecap="round">
    <line x1="305" y1="342" x2="495" y2="287"/>
    <line x1="495" y1="342" x2="305" y2="287"/>
    <line x1="305" y1="287" x2="495" y2="232"/>
    <line x1="495" y1="287" x2="305" y2="232"/>
    <line x1="305" y1="232" x2="495" y2="177"/>
    <line x1="495" y1="232" x2="305" y2="177"/>
  </g>
  <g stroke="#5a5a5a" stroke-width="8" stroke-linecap="round">
    <line x1="305" y1="342" x2="495" y2="287"/>
    <line x1="495" y1="342" x2="305" y2="287"/>
    <line x1="305" y1="287" x2="495" y2="232"/>
    <line x1="495" y1="287" x2="305" y2="232"/>
    <line x1="305" y1="232" x2="495" y2="177"/>
    <line x1="495" y1="232" x2="305" y2="177"/>
  </g>
  <!-- pivot dots -->
  <g fill="#1a1a1a">
    <circle cx="400" cy="314.5" r="5"/>
    <circle cx="400" cy="259.5" r="5"/>
    <circle cx="400" cy="204.5" r="5"/>
  </g>
  <g fill="#8a8a8a" stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="305" cy="287" r="4.5"/>
    <circle cx="495" cy="287" r="4.5"/>
    <circle cx="305" cy="232" r="4.5"/>
    <circle cx="495" cy="232" r="4.5"/>
  </g>

  <!-- operator (before toe board and rails) -->
  <rect x="365" y="138" width="9" height="28" fill="#2b2b2b"/>
  <rect x="382" y="138" width="9" height="28" fill="#2b2b2b"/>
  <line x1="384" y1="104" x2="444" y2="92" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
  <line x1="384" y1="104" x2="444" y2="92" stroke="#FF7F00" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="446" cy="91" r="4.5" fill="#e6b48c" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="360" y="92" width="30" height="50" rx="8" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="372" y="92" width="7" height="50" fill="#FFC326"/>
  <circle cx="375" cy="78" r="11" fill="#e6b48c" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M362 76 A13 13 0 0 1 388 76 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="357" y="74" width="36" height="5" rx="2.5" fill="#FFC326" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- platform deck -->
  <rect x="283" y="162" width="234" height="16" rx="2" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- extension deck -->
  <rect x="515" y="166" width="62" height="12" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
  <!-- toe board -->
  <rect x="283" y="146" width="234" height="16" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>

  <!-- guardrails -->
  <rect x="287" y="100" width="4" height="46" fill="#1a1a1a"/>
  <rect x="344" y="100" width="4" height="46" fill="#1a1a1a"/>
  <rect x="400" y="100" width="4" height="46" fill="#1a1a1a"/>
  <rect x="456" y="100" width="4" height="46" fill="#1a1a1a"/>
  <rect x="509" y="100" width="4" height="46" fill="#1a1a1a"/>
  <rect x="283" y="122" width="234" height="4" fill="#1a1a1a"/>
  <!-- extension deck rail -->
  <rect x="567" y="102" width="4" height="64" fill="#1a1a1a"/>
  <line x1="513" y1="99" x2="571" y2="99" stroke="#1a1a1a" stroke-width="5"/>
  <rect x="283" y="96" width="234" height="6" rx="2" fill="#1a1a1a"/>

  <!-- platform controls console -->
  <rect x="440" y="80" width="28" height="17" rx="3" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="448" cy="88" r="2.5" fill="#FFC326"/>
  <circle cx="457" cy="88" r="2.5" fill="#FF7F00"/>
  <circle cx="463" cy="88" r="2.5" fill="#019E7C"/>

  <!-- labels -->
  <g font-size="15" font-weight="600" fill="#1a1a1a">
    <line x1="238" y1="78" x2="298" y2="97" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="300" cy="98" r="3.5" fill="#FF7F00"/>
    <text x="230" y="74" text-anchor="end">Platform &amp; guardrails</text>

    <line x1="458" y1="74" x2="540" y2="52" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="454" cy="77" r="3.5" fill="#FF7F00"/>
    <text x="546" y="48">Platform controls</text>

    <line x1="560" y1="176" x2="625" y2="225" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="557" cy="172" r="3.5" fill="#FF7F00"/>
    <text x="630" y="243">Extension deck</text>

    <line x1="354" y1="271" x2="240" y2="271" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="360" cy="271" r="3.5" fill="#FF7F00"/>
    <text x="234" y="276" text-anchor="end">Scissor arms</text>

    <line x1="295" y1="350" x2="228" y2="330" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="300" cy="352" r="3.5" fill="#FF7F00"/>
    <text x="222" y="326" text-anchor="end">Chassis</text>

    <line x1="215" y1="140" x2="285" y2="152" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="290" cy="153" r="3.5" fill="#FF7F00"/>
    <text x="210" y="137" text-anchor="end">Toe board</text>

    <line x1="374" y1="394" x2="284" y2="426" stroke="#4f3b3b" stroke-width="1.5"/>
    <circle cx="379" cy="392" r="3.5" fill="#FF7F00"/>
    <text x="278" y="433" text-anchor="end">Pothole guards</text>
  </g>
</svg>
