  <rect x="686" y="86" width="28" height="18" rx="3" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="694" cy="95" r="2.5" fill="#FFC326"/>
  <circle cx="703" cy="95" r="2.5" fill="#FF7F00"/>
  <circle cx="710" cy="95" r="2.5" fill="#019E7C"/>
