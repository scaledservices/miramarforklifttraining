  <rect x="94" y="360" width="217" height="11" rx="4" fill="#e0a800"/>

  <!-- near wheels -->
  <circle cx="128" cy="374" r="26" fill="#1f1f1f" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="128" cy="374" r="9" fill="#8a8a8a" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="270" cy="374" r="26" fill="#1f1f1f" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="270" cy="374" r="9" fill="#8a8a8a" stroke="#1a1a1a" stroke-width="1.5"/>

