  <rect x="600" y="106" width="4" height="46" fill="#1a1a1a"/>
  <rect x="628" y="106" width="4" height="46" fill="#1a1a1a"/>
  <rect x="656" y="106" width="4" height="46" fill="#1a1a1a"/>
  <rect x="684" y="106" width="4" height="46" fill="#1a1a1a"/>
  <rect x="712" y="106" width="4" height="46" fill="#1a1a1a"/>
  <rect x="598" y="126" width="120" height="4" fill="#1a1a1a"/>
  <rect x="598" y="102" width="120" height="6" rx="2" fill="#1a1a1a"/>

