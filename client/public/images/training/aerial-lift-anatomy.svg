  <line x1="662" y1="114" x2="690" y2="101" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
  <line x1="662" y1="114" x2="690" y2="101" stroke="#FF7F00" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="692" cy="100" r="4.5" fill="#e6b48c" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="638" y="104" width="30" height="52" rx="8" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="650" y="104" width="7" height="52" fill="#FFC326"/>
  <line x1="641" y1="112" x2="667" y2="132" stroke="#4f3b3b" stroke-width="2.5"/>
