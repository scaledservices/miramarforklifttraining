<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <!-- background -->
  <rect width="800" height="450" fill="#faf8f5"/>

  <text x="30" y="42" font-size="22" font-weight="700" fill="#4f3b3b">Stability Triangle in Motion</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- ===== top-down forklift, forks pointing right ===== -->
  <!-- forks -->
  <rect x="480" y="215" width="160" height="13" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="480" y="272" width="160" height="13" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
  <!-- carriage bar -->
  <rect x="470" y="198" width="16" height="104" rx="3" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
  <!-- chassis -->
  <rect x="250" y="175" width="222" height="150" rx="18" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- counterweight shading (rear) -->
  <path d="M296,177 L270,177 Q252,177 252,195 L252,305 Q252,323 270,323 L296,323 Z" fill="#e0a800"/>
  <line x1="296" y1="177" x2="296" y2="323" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- overhead guard outline -->
  <rect x="330" y="198" width="112" height="104" rx="10" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="330" y1="250" x2="442" y2="250" stroke="#1a1a1a" stroke-width="1.5" opacity="0.35"/>

  <!-- front wheels -->
  <rect x="440" y="148" width="44" height="26" rx="7" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="440" y="326" width="44" height="26" rx="7" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>
  <!-- rear steer axle pivot -->
  <circle cx="285" cy="250" r="8" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>

  <!-- front axle line (dashed) -->
  <line x1="462" y1="142" x2="462" y2="362" stroke="#4f3b3b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="462" y="132" font-size="13" font-weight="600" fill="#4f3b3b" text-anchor="middle">Front axle</text>

  <!-- ===== stability triangle ===== -->
  <polygon points="462,161 462,339 285,250" fill="#019E7C" fill-opacity="0.25" stroke="#019E7C" stroke-width="2.5">
    <animate attributeName="fill" dur="8s" repeatCount="indefinite"
      values="#019E7C;#019E7C;#d64545;#d64545;#019E7C;#019E7C"
      keyTimes="0;0.25;0.29;0.70;0.74;1"/>
    <animate attributeName="stroke" dur="8s" repeatCount="indefinite"
      values="#019E7C;#019E7C;#d64545;#d64545;#019E7C;#019E7C"
      keyTimes="0;0.25;0.29;0.70;0.74;1"/>
    <animate attributeName="fill-opacity" dur="8s" repeatCount="indefinite"
      values="0.25;0.25;0.45;0.22;0.45;0.22;0.45;0.25;0.25"
      keyTimes="0;0.29;0.33;0.37;0.41;0.45;0.49;0.53;1"/>
  </polygon>

  <!-- ===== CG dot (animated) ===== -->
  <g>
    <circle cx="403" cy="250" r="12" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="403" y="254.5" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">CG</text>
    <animateTransform attributeName="transform" type="translate" dur="8s" repeatCount="indefinite"
      values="0 0;0 0;112 0;112 0;0 0;0 0"
      keyTimes="0;0.15;0.38;0.60;0.83;1"/>
  </g>

  <!-- ===== static annotations ===== -->
  <line x1="330" y1="222" x2="228" y2="152" stroke="#4f3b3b" stroke-width="1.5"/>
  <text x="222" y="146" font-size="15" font-weight="600" fill="#019E7C" text-anchor="end">Stability triangle</text>

  <line x1="281" y1="257" x2="202" y2="348" stroke="#4f3b3b" stroke-width="1.5"/>
  <text x="200" y="366" font-size="13" font-weight="600" fill="#4f3b3b" text-anchor="middle">Rear pivot (steer axle)</text>

  <text x="560" y="205" font-size="13" font-weight="600" fill="#4f3b3b" text-anchor="middle">Forks</text>

  <!-- forward direction arrow -->
  <line x1="540" y1="160" x2="618" y2="160" stroke="#4f3b3b" stroke-width="3" stroke-linecap="round"/>
  <polygon points="632,160 616,153 616,167" fill="#4f3b3b"/>
  <text x="582" y="148" font-size="13" font-weight="600" fill="#4f3b3b" text-anchor="middle">Forward</text>

  <text x="30" y="440" font-size="12" fill="#8a8378">CG = combined center of gravity of truck + load</text>

  <!-- ===== status labels (animated) ===== -->
  <text x="400" y="420" font-size="19" font-weight="700" fill="#019E7C" text-anchor="middle" opacity="1">
    Load lowered: CG centered (STABLE)
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      values="1;1;0;0;1;1" keyTimes="0;0.13;0.18;0.84;0.90;1"/>
  </text>
  <text x="400" y="420" font-size="19" font-weight="700" fill="#FF7F00" text-anchor="middle" opacity="0">
    Load raised: CG moves toward the forks
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.15;0.19;0.24;0.28;1"/>
  </text>
  <text x="400" y="422" font-size="24" font-weight="700" fill="#d64545" text-anchor="middle" opacity="0">
    TIP-OVER RISK
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      values="0;0;1;0.3;1;0.3;1;1;0;0"
      keyTimes="0;0.28;0.32;0.37;0.42;0.47;0.52;0.60;0.68;1"/>
  </text>
  <text x="400" y="420" font-size="19" font-weight="700" fill="#019E7C" text-anchor="middle" opacity="0">
    Load lowered: CG returns to center
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.64;0.70;0.78;0.83;1"/>
  </text>
</svg>
