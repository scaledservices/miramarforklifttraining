<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <rect width="800" height="450" fill="#faf8f5"/>

  <text x="30" y="42" font-size="22" font-weight="700" fill="#4f3b3b">OSHA 29 CFR 1910.178(l): Three Requirements</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- Card 1: Formal Instruction -->
  <g>
    <rect x="30" y="90" width="210" height="190" rx="10" fill="#ffffff" stroke="#4f3b3b" stroke-width="2"/>
    <path d="M30 100 a10 10 0 0 1 10 -10 h190 a10 10 0 0 1 10 10 v6 h-210 z" fill="#FFC326"/>
    <rect x="30" y="90" width="210" height="190" rx="10" fill="none" stroke="#4f3b3b" stroke-width="2"/>
    <!-- monitor icon -->
    <rect x="100" y="118" width="70" height="46" rx="6" fill="#ffffff" stroke="#4f3b3b" stroke-width="2.5"/>
    <line x1="110" y1="130" x2="160" y2="130" stroke="#FFC326" stroke-width="4"/>
    <line x1="110" y1="140" x2="160" y2="140" stroke="#c9bcae" stroke-width="3"/>
    <line x1="110" y1="149" x2="146" y2="149" stroke="#c9bcae" stroke-width="3"/>
    <rect x="130" y="164" width="10" height="9" fill="#4f3b3b"/>
    <rect x="115" y="173" width="40" height="6" rx="3" fill="#4f3b3b"/>
    <text x="135" y="218" font-size="18" font-weight="700" fill="#4f3b3b" text-anchor="middle">Formal Instruction</text>
    <text x="135" y="243" font-size="14" font-weight="600" fill="#6b5a50" text-anchor="middle">Online or classroom</text>
    <text x="135" y="261" font-size="14" font-weight="600" fill="#6b5a50" text-anchor="middle">(this course)</text>
  </g>

  <text x="257" y="200" font-size="42" font-weight="700" fill="#4f3b3b" text-anchor="middle">+</text>

  <!-- Card 2: Practical Training -->
  <g>
    <rect x="275" y="90" width="210" height="190" rx="10" fill="#ffffff" stroke="#4f3b3b" stroke-width="2"/>
    <path d="M275 100 a10 10 0 0 1 10 -10 h190 a10 10 0 0 1 10 10 v6 h-210 z" fill="#FFC326"/>
    <rect x="275" y="90" width="210" height="190" rx="10" fill="none" stroke="#4f3b3b" stroke-width="2"/>
    <!-- forklift silhouette icon -->
    <g fill="#4f3b3b">
      <rect x="335" y="150" width="52" height="28" rx="5"/>
      <path d="M342 150 v-22 h26 v22 z M348 134 h14 v16 h-14 z" fill-rule="evenodd"/>
      <rect x="390" y="118" width="7" height="60"/>
      <rect x="397" y="170" width="34" height="6"/>
      <circle cx="346" cy="182" r="9"/>
      <circle cx="378" cy="182" r="9"/>
    </g>
    <text x="380" y="218" font-size="18" font-weight="700" fill="#4f3b3b" text-anchor="middle">Practical Training</text>
    <text x="380" y="243" font-size="14" font-weight="600" fill="#6b5a50" text-anchor="middle">Hands-on at</text>
    <text x="380" y="261" font-size="14" font-weight="600" fill="#6b5a50" text-anchor="middle">your worksite</text>
  </g>

  <text x="502" y="200" font-size="42" font-weight="700" fill="#4f3b3b" text-anchor="middle">+</text>

  <!-- Card 3: Evaluation -->
  <g>
    <rect x="520" y="90" width="210" height="190" rx="10" fill="#ffffff" stroke="#4f3b3b" stroke-width="2"/>
    <path d="M520 100 a10 10 0 0 1 10 -10 h190 a10 10 0 0 1 10 10 v6 h-210 z" fill="#FFC326"/>
    <rect x="520" y="90" width="210" height="190" rx="10" fill="none" stroke="#4f3b3b" stroke-width="2"/>
    <!-- clipboard icon -->
    <rect x="595" y="114" width="60" height="72" rx="6" fill="#ffffff" stroke="#4f3b3b" stroke-width="2.5"/>
    <rect x="615" y="107" width="20" height="12" rx="4" fill="#4f3b3b"/>
    <line x1="605" y1="132" x2="645" y2="132" stroke="#c9bcae" stroke-width="3"/>
    <line x1="605" y1="143" x2="645" y2="143" stroke="#c9bcae" stroke-width="3"/>
    <path d="M608 162 l10 10 l19 -21" stroke="#019E7C" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="625" y="218" font-size="18" font-weight="700" fill="#4f3b3b" text-anchor="middle">Evaluation</text>
    <text x="625" y="243" font-size="14" font-weight="600" fill="#6b5a50" text-anchor="middle">Observed by</text>
    <text x="625" y="261" font-size="14" font-weight="600" fill="#6b5a50" text-anchor="middle">your employer</text>
  </g>

  <text x="763" y="200" font-size="42" font-weight="700" fill="#4f3b3b" text-anchor="middle">=</text>

  <!-- Result banner -->
  <rect x="60" y="330" width="680" height="62" rx="31" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="110" cy="361" r="20" fill="#1a1a1a"/>
  <path d="M100 361 l7 8 l14 -16" stroke="#FFC326" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="440" y="369" font-size="24" font-weight="700" fill="#1a1a1a" text-anchor="middle">Certified Forklift Operator</text>
</svg>
