<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <rect width="800" height="450" fill="#faf8f5"/>
  <defs>
    <marker id="dimArr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f3b3b"/>
    </marker>
  </defs>

  <text x="30" y="42" font-size="22" font-weight="700" fill="#4f3b3b">Aisle Widths &amp; Clearance</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- Ceiling beam + sprinkler pipe -->
  <rect x="0" y="72" width="800" height="12" fill="#4f3b3b"/>
  <line x1="40" y1="104" x2="760" y2="104" stroke="#4f3b3b" stroke-width="3"/>
  <g fill="#4f3b3b">
    <rect x="248" y="104" width="4" height="8"/>
    <rect x="243" y="112" width="14" height="3" rx="1.5"/>
    <rect x="558" y="104" width="4" height="8"/>
    <rect x="553" y="112" width="14" height="3" rx="1.5"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="370" width="800" height="80" fill="#eee7db"/>
  <line x1="0" y1="370" x2="800" y2="370" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Left rack -->
  <g>
    <rect x="78" y="140" width="10" height="230" fill="#4f3b3b"/>
    <rect x="182" y="140" width="10" height="230" fill="#4f3b3b"/>
    <line x1="88" y1="146" x2="182" y2="180" stroke="#4f3b3b" stroke-width="2"/>
    <line x1="182" y1="146" x2="88" y2="180" stroke="#4f3b3b" stroke-width="2"/>
    <rect x="78" y="240" width="114" height="8" fill="#4f3b3b"/>
    <rect x="78" y="332" width="114" height="8" fill="#4f3b3b"/>
    <!-- level 1 pallet + box -->
    <rect x="88" y="228" width="94" height="12" fill="#b08850" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="94" y="184" width="82" height="44" fill="#d9c29a" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="135" y1="184" x2="135" y2="228" stroke="#b08850" stroke-width="2"/>
    <!-- level 2 pallet + box -->
    <rect x="88" y="320" width="94" height="12" fill="#b08850" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="94" y="276" width="82" height="44" fill="#d9c29a" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="135" y1="276" x2="135" y2="320" stroke="#b08850" stroke-width="2"/>
  </g>

  <!-- Right rack -->
  <g>
    <rect x="608" y="140" width="10" height="230" fill="#4f3b3b"/>
    <rect x="712" y="140" width="10" height="230" fill="#4f3b3b"/>
    <line x1="618" y1="146" x2="712" y2="180" stroke="#4f3b3b" stroke-width="2"/>
    <line x1="712" y1="146" x2="618" y2="180" stroke="#4f3b3b" stroke-width="2"/>
    <rect x="608" y="240" width="114" height="8" fill="#4f3b3b"/>
    <rect x="608" y="332" width="114" height="8" fill="#4f3b3b"/>
    <rect x="618" y="228" width="94" height="12" fill="#b08850" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="624" y="184" width="82" height="44" fill="#d9c29a" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="665" y1="184" x2="665" y2="228" stroke="#b08850" stroke-width="2"/>
    <rect x="618" y="320" width="94" height="12" fill="#b08850" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="624" y="276" width="82" height="44" fill="#d9c29a" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="665" y1="276" x2="665" y2="320" stroke="#b08850" stroke-width="2"/>
  </g>

  <!-- Forklift, front view -->
  <g>
    <!-- mast -->
    <rect x="386" y="205" width="8" height="140" fill="#4f3b3b"/>
    <rect x="406" y="205" width="8" height="140" fill="#4f3b3b"/>
    <rect x="386" y="232" width="28" height="6" fill="#4f3b3b"/>
    <rect x="386" y="272" width="28" height="6" fill="#4f3b3b"/>
    <rect x="386" y="312" width="28" height="6" fill="#4f3b3b"/>
    <!-- overhead guard -->
    <rect x="343" y="200" width="7" height="76" fill="#1a1a1a"/>
    <rect x="450" y="200" width="7" height="76" fill="#1a1a1a"/>
    <rect x="334" y="190" width="132" height="12" rx="4" fill="#4f3b3b"/>
    <!-- body -->
    <rect x="336" y="272" width="128" height="62" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- wheels -->
    <circle cx="356" cy="348" r="22" fill="#1a1a1a"/>
    <circle cx="356" cy="348" r="9" fill="#777"/>
    <circle cx="444" cy="348" r="22" fill="#1a1a1a"/>
    <circle cx="444" cy="348" r="9" fill="#777"/>
    <!-- fork tips facing viewer -->
    <rect x="374" y="356" width="12" height="12" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="414" y="356" width="12" height="12" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- Overhead clearance arrow -->
  <line x1="430" y1="112" x2="430" y2="184" stroke="#4f3b3b" stroke-width="2" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <text x="444" y="152" font-size="15" font-weight="600" fill="#1a1a1a">Overhead clearance</text>

  <!-- Side clearance arrows -->
  <line x1="196" y1="302" x2="330" y2="302" stroke="#4f3b3b" stroke-width="2" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <text x="263" y="270" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">Min clearance</text>
  <text x="263" y="288" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">each side</text>
  <line x1="470" y1="302" x2="604" y2="302" stroke="#4f3b3b" stroke-width="2" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <text x="537" y="270" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">Min clearance</text>
  <text x="537" y="288" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">each side</text>

  <!-- Aisle width arrow -->
  <line x1="196" y1="390" x2="604" y2="390" stroke="#4f3b3b" stroke-width="2" marker-start="url(#dimArr)" marker-end="url(#dimArr)"/>
  <line x1="192" y1="376" x2="192" y2="404" stroke="#4f3b3b" stroke-width="1.5"/>
  <line x1="608" y1="376" x2="608" y2="396" stroke="#4f3b3b" stroke-width="1.5"/>
  <text x="400" y="414" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">Wide aisle: 12+ ft</text>

  <!-- Note card -->
  <rect x="545" y="398" width="240" height="46" rx="8" fill="#ffffff" stroke="#4f3b3b" stroke-width="2"/>
  <text x="557" y="417" font-size="14" font-weight="600" fill="#1a1a1a">Narrow aisles require special</text>
  <text x="557" y="435" font-size="14" font-weight="600" fill="#1a1a1a">equipment &amp; training</text>
</svg>
