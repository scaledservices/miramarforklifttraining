<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <defs>
    <!-- simplified loaded forklift, facing right, ground line at local y=0 -->
    <g id="lift">
      <path d="M-72,-4 L-72,-34 Q-72,-42 -64,-42 L-42,-42 L-42,-4 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2"/>
      <rect x="-50" y="-46" width="66" height="30" rx="5" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="-40" y1="-46" x2="-38" y2="-80" stroke="#3d3d3d" stroke-width="4"/>
      <line x1="4" y1="-46" x2="2" y2="-80" stroke="#3d3d3d" stroke-width="4"/>
      <rect x="-46" y="-84" width="54" height="6" rx="3" fill="#3d3d3d"/>
      <circle cx="-38" cy="-13" r="13" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="-38" cy="-13" r="5" fill="#8a8378"/>
      <circle cx="8" cy="-14" r="14" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="8" cy="-14" r="5.5" fill="#8a8378"/>
      <rect x="22" y="-94" width="5" height="90" fill="#555" stroke="#1a1a1a" stroke-width="1.5"/>
      <rect x="29" y="-94" width="5" height="90" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="1.5"/>
      <rect x="34" y="-62" width="4" height="48" fill="#777" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M38,-14 L42,-14 L42,-6 L80,-6 L80,-1 L38,-1 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="1.5"/>
      <rect x="40" y="-48" width="38" height="42" fill="#d9c7a8" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="40" y1="-27" x2="78" y2="-27" stroke="#b89d74" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- background -->
  <rect width="800" height="450" fill="#faf8f5"/>
  <rect x="0" y="400" width="800" height="50" fill="#e8e2d8"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#b8ad9c" stroke-width="2"/>

  <!-- ===== warehouse floor slab (right) ===== -->
  <rect x="490" y="300" width="310" height="100" fill="#cfc8ba" stroke="#1a1a1a" stroke-width="2"/>
  <!-- dock bumper on face -->
  <rect x="481" y="318" width="9" height="28" rx="2" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- red painted dock edge -->
  <rect x="490" y="296" width="26" height="6" fill="#d64545" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="490" y="302" width="6" height="20" fill="#d64545"/>

  <!-- ===== trailer (left), backed to dock ===== -->
  <!-- interior -->
  <rect x="84" y="196" width="366" height="112" fill="#f2efe9"/>
  <!-- roof -->
  <rect x="70" y="184" width="380" height="12" fill="#b8b2a6" stroke="#1a1a1a" stroke-width="2"/>
  <!-- front wall -->
  <rect x="70" y="184" width="14" height="140" fill="#b8b2a6" stroke="#1a1a1a" stroke-width="2"/>
  <!-- floor / bed -->
  <rect x="70" y="308" width="380" height="16" fill="#8a8378" stroke="#1a1a1a" stroke-width="2"/>
  <!-- undercarriage + wheels -->
  <rect x="225" y="324" width="140" height="18" fill="#4a4540" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="258" cy="372" r="28" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="258" cy="372" r="10" fill="#8a8378"/>
  <circle cx="328" cy="372" r="28" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="328" cy="372" r="10" fill="#8a8378"/>
  <!-- landing gear -->
  <rect x="112" y="324" width="10" height="72" fill="#4a4540" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="103" y="394" width="28" height="6" fill="#4a4540" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- wheel chocks -->
  <polygon points="202,400 226,400 226,378" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="272,400 296,400 296,378" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>

  <!-- tiny forklift inside trailer, facing in -->
  <use href="#lift" transform="translate(330,308) scale(-0.5,0.5)"/>

  <!-- ===== dock plate bridging the gap ===== -->
  <polygon points="380,308 500,300 500,306 380,314" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke="#1a1a1a" stroke-width="1.2">
    <line x1="394" y1="308.6" x2="388" y2="313.0" stroke-width="1.2"/>
    <line x1="408" y1="307.6" x2="402" y2="312.0"/>
    <line x1="422" y1="306.7" x2="416" y2="311.1"/>
    <line x1="436" y1="305.8" x2="430" y2="310.2"/>
    <line x1="450" y1="304.8" x2="444" y2="309.2"/>
    <line x1="464" y1="303.9" x2="458" y2="308.3"/>
    <line x1="478" y1="303.0" x2="472" y2="307.4"/>
    <line x1="492" y1="302.1" x2="486" y2="306.5"/>
  </g>
</svg>
