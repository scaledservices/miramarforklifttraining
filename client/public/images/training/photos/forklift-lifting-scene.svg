<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- wall -->
  <rect width="800" height="450" fill="#ece6dc"/>
  <rect x="0" y="0" width="800" height="26" fill="#ded6c7"/>
  <g stroke="#dfd8cb" stroke-width="3">
    <line x1="100" y1="26" x2="100" y2="400"/>
    <line x1="260" y1="26" x2="260" y2="400"/>
    <line x1="420" y1="26" x2="420" y2="400"/>
  </g>
  <!-- window band -->
  <g>
    <rect x="40" y="44" width="120" height="34" rx="3" fill="#f7f1df" stroke="#c9c2b4" stroke-width="2"/>
    <rect x="180" y="44" width="120" height="34" rx="3" fill="#f7f1df" stroke="#c9c2b4" stroke-width="2"/>
    <rect x="320" y="44" width="120" height="34" rx="3" fill="#f7f1df" stroke="#c9c2b4" stroke-width="2"/>
  </g>
  <!-- ceiling light -->
  <line x1="220" y1="0" x2="220" y2="20" stroke="#b8ad9c" stroke-width="3"/>
  <rect x="170" y="20" width="100" height="12" rx="3" fill="#efe9dd" stroke="#b8ad9c" stroke-width="2"/>
  <rect x="174" y="28" width="92" height="4" fill="#ffe9a8"/>

  <!-- faint background racking far left -->
  <g>
    <rect x="0" y="120" width="10" height="280" fill="#d3c9b8"/>
    <rect x="70" y="120" width="10" height="280" fill="#d3c9b8"/>
    <rect x="0" y="210" width="80" height="8" fill="#cfc5b3"/>
    <rect x="0" y="310" width="80" height="8" fill="#cfc5b3"/>
    <rect x="6" y="240" width="30" height="70" fill="#e4d6bd"/>
    <rect x="40" y="256" width="26" height="54" fill="#ddccae"/>
    <rect x="6" y="140" width="34" height="70" fill="#e4d6bd"/>
    <rect x="44" y="156" width="24" height="54" fill="#ddccae"/>
  </g>

  <!-- floor -->
  <rect x="0" y="400" width="800" height="50" fill="#d8d2c6"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#c2bbad" stroke-width="2"/>
  <line x1="0" y1="428" x2="800" y2="428" stroke="#c9c2b4" stroke-width="2"/>
  <line x1="530" y1="400" x2="510" y2="450" stroke="#c9c2b4" stroke-width="2"/>

  <!-- ================= RACK (right) ================= -->
  <g>
    <rect x="628" y="394" width="172" height="9" fill="rgba(0,0,0,0.11)"/>
    <rect x="640" y="88" width="13" height="312" fill="#4f3b3b"/>
    <rect x="770" y="88" width="13" height="312" fill="#4f3b3b"/>
    <line x1="653" y1="150" x2="770" y2="230" stroke="#6b5a4e" stroke-width="4"/>
    <line x1="653" y1="330" x2="770" y2="250" stroke="#6b5a4e" stroke-width="4"/>
    <!-- beams: level 2 and level 3 -->
    <rect x="634" y="272" width="166" height="11" fill="#6b5a4e" stroke="#3f2f2f" stroke-width="1.5"/>
    <rect x="634" y="140" width="166" height="11" fill="#6b5a4e" stroke="#3f2f2f" stroke-width="1.5"/>
    <!-- floor-level stock -->
    <rect x="660" y="386" width="120" height="12" fill="#a67c4f"/>
    <rect x="666" y="330" width="58" height="56" fill="#c9a26b"/>
    <rect x="728" y="342" width="48" height="44" fill="#b8895a"/>
    <line x1="695" y1="330" x2="695" y2="386" stroke="#b18a52" stroke-width="2.5"/>
    <!-- level 3 stock -->
    <rect x="668" y="128" width="116" height="12" fill="#a67c4f"/>
    <rect x="672" y="76" width="54" height="52" fill="#d4b183"/>
    <rect x="730" y="88" width="50" height="40" fill="#c9a26b"/>
  </g>

  <!-- ================= FORKLIFT (raised load) ================= -->
  <g transform="translate(60,60) scale(0.85)">
    <ellipse cx="400" cy="404" rx="270" ry="15" fill="rgba(0,0,0,0.12)"/>
    <!-- counterweight -->
    <path d="M150,350 L150,300 Q150,285 165,285 L230,285 L230,350 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- body -->
    <rect x="200" y="290" width="200" height="60" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- seat -->
    <rect x="240" y="196" width="13" height="48" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="248" y="238" width="54" height="14" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <!-- operator -->
    <path d="M270,244 L318,250 L330,280" fill="none" stroke="#3f4652" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M254,244 Q250,196 280,184 L302,188 Q312,216 306,246 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M266,240 Q264,204 282,190" fill="none" stroke="#ffe14d" stroke-width="5"/>
    <path d="M300,196 L296,242" stroke="#2b2b2b" stroke-width="6" stroke-linecap="round"/>
    <path d="M296,202 L318,226" stroke="#e06f00" stroke-width="9" stroke-linecap="round"/>
    <circle cx="320" cy="228" r="5" fill="#e0ac69"/>
    <circle cx="290" cy="166" r="12" fill="#e0ac69"/>
    <path d="M277,164 Q277,148 290,148 Q304,148 304,164 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="273" y="161" width="35" height="5" rx="2" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- hood / dash -->
    <path d="M330,290 L330,255 Q330,248 337,248 L392,248 Q400,248 400,258 L400,290 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M340,250 L322,232" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="318" cy="228" r="9" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- wheels -->
    <circle cx="370" cy="352" r="48" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="370" cy="352" r="22" fill="#8a8378"/>
    <circle cx="370" cy="352" r="8" fill="#4a4540"/>
    <circle cx="212" cy="364" r="36" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="212" cy="364" r="16" fill="#8a8378"/>
    <circle cx="212" cy="364" r="6" fill="#4a4540"/>
    <!-- overhead guard -->
    <line x1="222" y1="290" x2="228" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <line x1="352" y1="252" x2="342" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <rect x="212" y="136" width="146" height="12" rx="5" fill="#3d3d3d"/>
    <g stroke="#3d3d3d" stroke-width="4">
      <line x1="242" y1="140" x2="242" y2="147"/>
      <line x1="268" y1="140" x2="268" y2="147"/>
      <line x1="294" y1="140" x2="294" y2="147"/>
      <line x1="320" y1="140" x2="320" y2="147"/>
    </g>
    <!-- mast link -->
    <rect x="398" y="300" width="38" height="26" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <!-- outer mast -->
    <rect x="432" y="118" width="13" height="274" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="455" y="118" width="13" height="274" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="2"/>
    <g stroke="#1a1a1a" stroke-width="2" fill="#555">
      <rect x="432" y="150" width="36" height="8"/>
      <rect x="432" y="230" width="36" height="8"/>
      <rect x="432" y="310" width="36" height="8"/>
    </g>
    <!-- inner mast extended -->
    <rect x="436" y="34" width="9" height="96" fill="#777" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="457" y="34" width="9" height="96" fill="#8a8a8a" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="436" y="34" width="30" height="7" fill="#777" stroke="#1a1a1a" stroke-width="2"/>
    <!-- lift chain -->
    <line x1="474" y1="44" x2="474" y2="118" stroke="#8a8378" stroke-width="3" stroke-dasharray="4 3"/>
    <!-- raised carriage: backrest -->
    <g stroke="#1a1a1a" stroke-width="2">
      <rect x="478" y="88" width="12" height="152" fill="#777"/>
      <line x1="478" y1="116" x2="490" y2="116"/>
      <line x1="478" y1="144" x2="490" y2="144"/>
      <line x1="478" y1="172" x2="490" y2="172"/>
      <line x1="478" y1="200" x2="490" y2="200"/>
    </g>
    <!-- raised forks -->
    <path d="M490,122 L502,122 L502,244 L664,244 L664,256 L490,256 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <!-- palletized load on forks -->
    <rect x="500" y="230" width="156" height="14" fill="#a67c4f" stroke="#7c5a36" stroke-width="1.5"/>
    <rect x="514" y="236" width="16" height="8" fill="#8f6a42"/>
    <rect x="566" y="236" width="16" height="8" fill="#8f6a42"/>
    <rect x="618" y="236" width="16" height="8" fill="#8f6a42"/>
    <rect x="504" y="168" width="72" height="62" fill="#c9a26b" stroke="#9c7847" stroke-width="1.5"/>
    <line x1="540" y1="168" x2="540" y2="230" stroke="#b18a52" stroke-width="3"/>
    <rect x="580" y="178" width="70" height="52" fill="#b8895a" stroke="#8f6a42" stroke-width="1.5"/>
    <line x1="615" y1="178" x2="615" y2="230" stroke="#a3764a" stroke-width="3"/>
    <rect x="520" y="128" width="52" height="40" fill="#d4b183" stroke="#9c7847" stroke-width="1.5"/>
  </g>

  <!-- ================= SPOTTER ================= -->
  <g>
    <ellipse cx="106" cy="402" rx="34" ry="7" fill="rgba(0,0,0,0.12)"/>
    <!-- legs -->
    <path d="M98,352 L96,398" stroke="#3f4652" stroke-width="13" stroke-linecap="round"/>
    <path d="M114,352 L120,398" stroke="#3f4652" stroke-width="13" stroke-linecap="round"/>
    <rect x="88" y="392" width="18" height="9" rx="3" fill="#2b2b2b"/>
    <rect x="112" y="392" width="18" height="9" rx="3" fill="#2b2b2b"/>
    <!-- torso / vest -->
    <path d="M92,300 L122,300 Q130,326 126,356 L88,356 Q84,326 92,300 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="99" y1="302" x2="97" y2="354" stroke="#ffe14d" stroke-width="5"/>
    <line x1="116" y1="302" x2="118" y2="354" stroke="#ffe14d" stroke-width="5"/>
    <!-- arm raised toward load -->
    <path d="M118,308 L148,292 L172,276" fill="none" stroke="#e06f00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="176" cy="273" r="6" fill="#8d5524"/>
    <!-- other arm -->
    <path d="M94,308 L86,340" stroke="#e06f00" stroke-width="10" stroke-linecap="round"/>
    <circle cx="85" cy="345" r="6" fill="#8d5524"/>
    <!-- head -->
    <circle cx="108" cy="280" r="13" fill="#8d5524"/>
    <path d="M94,278 Q94,260 108,260 Q123,260 123,278 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="90" y="274" width="37" height="6" rx="3" fill="#e8e4dc" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>
