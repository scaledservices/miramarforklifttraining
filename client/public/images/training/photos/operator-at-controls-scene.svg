<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- background wall -->
  <rect width="800" height="450" fill="#f3efe8"/>
  <rect x="0" y="0" width="800" height="70" fill="#efe9de"/>
  <line x1="0" y1="70" x2="800" y2="70" stroke="#e2dacb" stroke-width="2"/>

  <!-- soft distant racking (blurred / low contrast) -->
  <g>
    <rect x="20" y="90" width="14" height="290" fill="#e0d7c7"/>
    <rect x="220" y="90" width="14" height="290" fill="#e0d7c7"/>
    <rect x="620" y="90" width="14" height="290" fill="#e0d7c7"/>
    <rect x="770" y="90" width="14" height="290" fill="#e0d7c7"/>
    <rect x="0" y="150" width="800" height="10" fill="#ddd4c3"/>
    <rect x="0" y="270" width="800" height="10" fill="#ddd4c3"/>
    <rect x="48" y="176" width="80" height="94" fill="#ece1cd"/>
    <rect x="132" y="196" width="66" height="74" fill="#e7dac2"/>
    <rect x="250" y="184" width="74" height="86" fill="#ece1cd"/>
    <rect x="646" y="190" width="72" height="80" fill="#e7dac2"/>
    <rect x="52" y="62" width="70" height="88" fill="#ece1cd"/>
    <rect x="256" y="72" width="60" height="78" fill="#e7dac2"/>
    <rect x="654" y="66" width="66" height="84" fill="#ece1cd"/>
  </g>

  <!-- floor -->
  <rect x="0" y="380" width="800" height="70" fill="#d8d2c6"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#c2bbad" stroke-width="2"/>
  <line x1="120" y1="418" x2="800" y2="418" stroke="#c9c2b4" stroke-width="2"/>

  <!-- shadow -->
  <ellipse cx="380" cy="446" rx="330" ry="12" fill="rgba(0,0,0,0.12)"/>

  <!-- ===== forklift cab, close-in side view, facing right ===== -->
  <!-- counterweight -->
  <path d="M28,404 L28,308 Q28,286 52,286 L130,286 L130,404 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- body -->
  <rect x="96" y="292" width="470" height="100" rx="12" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="120" y="316" width="300" height="10" rx="5" fill="#e0a800"/>
  <!-- rear wheel -->
  <circle cx="152" cy="392" r="52" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="152" cy="392" r="24" fill="#8a8378"/>
  <circle cx="152" cy="392" r="9" fill="#4a4540"/>
  <!-- floor plate for feet -->
  <rect x="330" y="286" width="150" height="14" rx="4" fill="#e0a800" stroke="#1a1a1a" stroke-width="2"/>

  <!-- seat pedestal -->
  <rect x="226" y="256" width="82" height="40" rx="4" fill="#e0a800" stroke="#1a1a1a" stroke-width="2"/>
  <!-- seat -->
  <rect x="200" y="118" width="26" height="126" rx="10" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="200" y="234" width="120" height="26" rx="10" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- ===== operator ===== -->
  <!-- rear leg (further from viewer, darker) -->
  <path d="M282,252 L372,258 L392,300" fill="none" stroke="#333a45" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- near leg -->
  <path d="M270,248 L360,250 L382,296" fill="none" stroke="#3f4652" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M376,290 L404,296" stroke="#2b2b2b" stroke-width="18" stroke-linecap="round"/>
  <!-- torso -->
  <path d="M244,246 Q246,170 286,146 L330,146 Q348,190 340,250 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
  <!-- vest stripes -->
  <path d="M262,242 Q262,180 288,152" fill="none" stroke="#ffe14d" stroke-width="8"/>
  <path d="M318,150 Q330,196 324,246" fill="none" stroke="#ffe14d" stroke-width="8"/>
  <!-- seat belt across torso -->
  <path d="M332,150 L254,240" stroke="#2b2b2b" stroke-width="11" stroke-linecap="round"/>
  <rect x="246" y="232" width="24" height="16" rx="3" fill="#8a8378" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- head -->
  <circle cx="322" cy="112" r="27" fill="#c68642"/>
  <!-- ear -->
  <circle cx="304" cy="116" r="5" fill="#b3763a"/>
  <!-- hard hat -->
  <path d="M292,106 Q294,74 322,74 Q352,74 352,106 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="286" y="102" width="72" height="9" rx="4" fill="#e0a800" stroke="#1a1a1a" stroke-width="2"/>
  <!-- near arm to steering wheel -->
  <path d="M312,172 L392,210 L440,178" fill="none" stroke="#FF7F00" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M312,172 L392,210 L440,178" fill="none" stroke="#ffe14d" stroke-width="5" stroke-dasharray="14 30" stroke-linecap="round"/>
  <circle cx="443" cy="173" r="10" fill="#c68642"/>

  <!-- dash console + steering -->
  <path d="M470,292 L470,214 Q470,200 486,200 L548,200 Q566,200 566,222 L566,292 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M488,204 L462,166" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
  <circle cx="456" cy="158" r="20" fill="none" stroke="#1a1a1a" stroke-width="6"/>
  <circle cx="456" cy="158" r="4" fill="#1a1a1a"/>
  <!-- hydraulic levers -->
  <path d="M528,198 L522,158" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <circle cx="521" cy="154" r="6" fill="#2b2b2b"/>
  <path d="M546,198 L546,164" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <circle cx="546" cy="160" r="6" fill="#2b2b2b"/>
  <!-- gauge on dash -->
  <circle cx="502" cy="240" r="12" fill="#f5f2ec" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="502" y1="240" x2="509" y2="232" stroke="#1a1a1a" stroke-width="2"/>
  <!-- far arm over dash to lever -->
  <path d="M322,168 L432,192 L512,168" fill="none" stroke="#e06f00" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="519" cy="160" r="9" fill="#c68642"/>

  <!-- front wheel -->
  <circle cx="520" cy="382" r="62" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="520" cy="382" r="28" fill="#8a8378"/>
  <circle cx="520" cy="382" r="11" fill="#4a4540"/>

  <!-- overhead guard -->
  <line x1="160" y1="292" x2="172" y2="44" stroke="#3d3d3d" stroke-width="13" stroke-linecap="round"/>
  <line x1="560" y1="204" x2="540" y2="44" stroke="#3d3d3d" stroke-width="13" stroke-linecap="round"/>
  <rect x="150" y="28" width="410" height="18" rx="8" fill="#3d3d3d"/>
  <g stroke="#3d3d3d" stroke-width="6">
    <line x1="230" y1="36" x2="230" y2="52"/>
    <line x1="300" y1="36" x2="300" y2="52"/>
    <line x1="370" y1="36" x2="370" y2="52"/>
    <line x1="440" y1="36" x2="440" y2="52"/>
  </g>

  <!-- mast carriage link to chassis -->
  <rect x="558" y="330" width="60" height="34" rx="5" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
  <!-- mast at right edge -->
  <rect x="612" y="0" width="22" height="444" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="650" y="0" width="22" height="444" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke="#1a1a1a" stroke-width="2" fill="#555">
    <rect x="612" y="80" width="60" height="14"/>
    <rect x="612" y="220" width="60" height="14"/>
    <rect x="612" y="352" width="60" height="14"/>
  </g>
  <line x1="684" y1="10" x2="684" y2="210" stroke="#8a8378" stroke-width="4" stroke-dasharray="6 5"/>
  <!-- load backrest partial -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="692" y="140" width="20" height="304" fill="#777"/>
    <line x1="692" y1="196" x2="712" y2="196"/>
    <line x1="692" y1="252" x2="712" y2="252"/>
    <line x1="692" y1="308" x2="712" y2="308"/>
    <line x1="692" y1="364" x2="712" y2="364"/>
  </g>
  <!-- fork heel -->
  <path d="M712,206 L734,206 L734,424 L800,424 L800,444 L712,444 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
</svg>
