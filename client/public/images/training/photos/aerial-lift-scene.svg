<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- wall -->
  <rect width="800" height="450" fill="#ece6dc"/>
  <g stroke="#dfd8cb" stroke-width="3">
    <line x1="160" y1="30" x2="160" y2="396"/>
    <line x1="480" y1="30" x2="480" y2="396"/>
    <line x1="660" y1="30" x2="660" y2="396"/>
  </g>
  <!-- ceiling structure -->
  <rect x="0" y="0" width="800" height="14" fill="#ded6c7"/>
  <rect x="0" y="14" width="800" height="9" fill="#b8ad9c"/>
  <g stroke="#c9c0ae" stroke-width="3">
    <line x1="60" y1="23" x2="60" y2="34"/>
    <line x1="180" y1="23" x2="180" y2="34"/>
    <line x1="300" y1="23" x2="300" y2="34"/>
    <line x1="540" y1="23" x2="540" y2="34"/>
    <line x1="700" y1="23" x2="700" y2="34"/>
  </g>
  <!-- working light fixture (right, lit) -->
  <line x1="640" y1="23" x2="640" y2="42" stroke="#b8ad9c" stroke-width="3"/>
  <rect x="596" y="42" width="88" height="12" rx="3" fill="#efe9dd" stroke="#b8ad9c" stroke-width="2"/>
  <rect x="600" y="50" width="80" height="4" fill="#ffe9a8"/>
  <!-- fixture being serviced (dark, above platform) -->
  <line x1="352" y1="23" x2="352" y2="34" stroke="#b8ad9c" stroke-width="3"/>
  <rect x="310" y="34" width="84" height="13" rx="3" fill="#d8d0c0" stroke="#9a9080" stroke-width="2"/>

  <!-- background racking, far left -->
  <g>
    <rect x="0" y="120" width="9" height="276" fill="#d8cfbd"/>
    <rect x="100" y="120" width="9" height="276" fill="#d8cfbd"/>
    <rect x="0" y="206" width="109" height="7" fill="#d3c9b6"/>
    <rect x="0" y="296" width="109" height="7" fill="#d3c9b6"/>
    <rect x="12" y="232" width="38" height="64" fill="#e8dcc2"/>
    <rect x="56" y="246" width="36" height="50" fill="#e0d2b4"/>
    <rect x="14" y="136" width="40" height="70" fill="#e0d2b4"/>
    <rect x="60" y="150" width="34" height="56" fill="#e8dcc2"/>
    <rect x="12" y="330" width="40" height="66" fill="#e4d6bd"/>
    <rect x="58" y="342" width="38" height="54" fill="#ddccae"/>
  </g>

  <!-- floor -->
  <rect x="0" y="396" width="800" height="54" fill="#d8d2c6"/>
  <line x1="0" y1="396" x2="800" y2="396" stroke="#c2bbad" stroke-width="2"/>
  <line x1="0" y1="426" x2="800" y2="426" stroke="#c9c2b4" stroke-width="1.5"/>

  <!-- ================= SCISSOR LIFT ================= -->
  <ellipse cx="340" cy="436" rx="130" ry="10" fill="rgba(0,0,0,0.13)"/>
  <!-- scissor arms -->
  <g stroke="#5f5f5f" stroke-width="10" stroke-linecap="round">
    <line x1="262" y1="382" x2="418" y2="314"/>
    <line x1="418" y1="382" x2="262" y2="314"/>
    <line x1="262" y1="314" x2="418" y2="246"/>
    <line x1="418" y1="314" x2="262" y2="246"/>
    <line x1="262" y1="246" x2="418" y2="178"/>
    <line x1="418" y1="246" x2="262" y2="178"/>
  </g>
  <g fill="#2b2b2b">
    <circle cx="262" cy="382" r="5"/>
    <circle cx="418" cy="382" r="5"/>
    <circle cx="262" cy="314" r="5"/>
    <circle cx="418" cy="314" r="5"/>
    <circle cx="340" cy="348" r="5"/>
    <circle cx="262" cy="246" r="5"/>
    <circle cx="418" cy="246" r="5"/>
    <circle cx="340" cy="280" r="5"/>
    <circle cx="262" cy="178" r="5"/>
    <circle cx="418" cy="178" r="5"/>
    <circle cx="340" cy="212" r="5"/>
  </g>
  <!-- base -->
  <rect x="248" y="378" width="184" height="34" rx="5" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="248" y="398" width="184" height="14" rx="5" fill="#e0a800"/>
  <circle cx="284" cy="418" r="17" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="284" cy="418" r="7" fill="#8a8378"/>
  <circle cx="398" cy="418" r="17" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="398" cy="418" r="7" fill="#8a8378"/>

  <!-- ================= WORKER ON PLATFORM (behind front rail) ================= -->
  <g>
    <!-- reaching arm up to fixture -->
    <path d="M342,76 L354,56 L362,44" fill="none" stroke="#e06f00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="364" cy="40" r="6" fill="#c68642"/>
    <!-- legs -->
    <path d="M322,108 L320,146" stroke="#3f4652" stroke-width="12" stroke-linecap="round"/>
    <path d="M338,108 L341,146" stroke="#3f4652" stroke-width="12" stroke-linecap="round"/>
    <rect x="312" y="142" width="17" height="8" rx="3" fill="#2b2b2b"/>
    <rect x="334" y="142" width="17" height="8" rx="3" fill="#2b2b2b"/>
    <!-- torso vest -->
    <path d="M315,68 L346,68 Q354,86 350,112 L311,112 Q307,86 315,68 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="323" y1="70" x2="321" y2="110" stroke="#ffe14d" stroke-width="5"/>
    <line x1="340" y1="70" x2="342" y2="110" stroke="#ffe14d" stroke-width="5"/>
    <!-- harness straps -->
    <path d="M318,72 L344,104 M344,72 L318,104" stroke="#4f3b3b" stroke-width="5"/>
    <rect x="324" y="84" width="14" height="9" rx="2" fill="#8a8378" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- lanyard to rail anchor -->
    <path d="M316,84 Q276,120 254,92" fill="none" stroke="#d94f30" stroke-width="4"/>
    <!-- other arm on rail -->
    <path d="M317,76 L298,88" stroke="#e06f00" stroke-width="10" stroke-linecap="round"/>
    <circle cx="294" cy="90" r="6" fill="#c68642"/>
    <!-- head -->
    <circle cx="331" cy="52" r="13" fill="#c68642"/>
    <path d="M317,50 Q317,32 331,32 Q346,32 346,50 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="313" y="46" width="37" height="6" rx="3" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- platform + guardrails (in front of worker legs) -->
  <rect x="240" y="150" width="200" height="18" rx="3" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="240" y="162" width="200" height="6" fill="#e0a800"/>
  <g stroke="#3d3d3d" stroke-width="5">
    <line x1="247" y1="94" x2="247" y2="150"/>
    <line x1="340" y1="94" x2="340" y2="150"/>
    <line x1="433" y1="94" x2="433" y2="150"/>
    <line x1="242" y1="122" x2="438" y2="122"/>
  </g>
  <rect x="240" y="86" width="200" height="9" rx="4" fill="#3d3d3d"/>
  <!-- control box -->
  <rect x="414" y="98" width="22" height="26" rx="3" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- ================= CONES marking work zone ================= -->
  <g>
    <ellipse cx="186" cy="430" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
    <polygon points="172,428 200,428 189,396 183,396" fill="#FF7F00" stroke="#c65f00" stroke-width="1.5"/>
    <rect x="179" y="410" width="14" height="7" fill="#ffffff"/>
    <rect x="168" y="426" width="36" height="6" rx="2" fill="#e06f00"/>
    <ellipse cx="256" cy="444" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
    <polygon points="242,442 270,442 259,410 253,410" fill="#FF7F00" stroke="#c65f00" stroke-width="1.5"/>
    <rect x="249" y="424" width="14" height="7" fill="#ffffff"/>
    <rect x="238" y="440" width="36" height="6" rx="2" fill="#e06f00"/>
    <ellipse cx="452" cy="442" rx="20" ry="4" fill="rgba(0,0,0,0.12)"/>
    <polygon points="438,440 466,440 455,408 449,408" fill="#FF7F00" stroke="#c65f00" stroke-width="1.5"/>
    <rect x="445" y="422" width="14" height="7" fill="#ffffff"/>
    <rect x="434" y="438" width="36" height="6" rx="2" fill="#e06f00"/>
    <ellipse cx="512" cy="424" rx="18" ry="4" fill="rgba(0,0,0,0.12)"/>
    <polygon points="499,422 525,422 515,392 509,392" fill="#FF7F00" stroke="#c65f00" stroke-width="1.5"/>
    <rect x="505" y="405" width="13" height="6" fill="#ffffff"/>
    <rect x="495" y="420" width="34" height="6" rx="2" fill="#e06f00"/>
  </g>

  <!-- ================= GROUND GUARD looking up ================= -->
  <g>
    <ellipse cx="600" cy="436" rx="32" ry="7" fill="rgba(0,0,0,0.12)"/>
    <path d="M592,386 L590,428" stroke="#3f4652" stroke-width="13" stroke-linecap="round"/>
    <path d="M608,386 L614,428" stroke="#3f4652" stroke-width="13" stroke-linecap="round"/>
    <rect x="581" y="424" width="18" height="9" rx="3" fill="#2b2b2b"/>
    <rect x="606" y="424" width="18" height="9" rx="3" fill="#2b2b2b"/>
    <path d="M586,334 L616,334 Q624,360 620,390 L582,390 Q578,360 586,334 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="593" y1="336" x2="591" y2="388" stroke="#ffe14d" stroke-width="5"/>
    <line x1="610" y1="336" x2="612" y2="388" stroke="#ffe14d" stroke-width="5"/>
    <!-- arm raised shading eyes toward lift -->
    <path d="M590,342 L566,322 L576,306" fill="none" stroke="#5a6470" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="578" cy="302" r="6" fill="#f1c27d"/>
    <path d="M614,342 L622,374" stroke="#5a6470" stroke-width="10" stroke-linecap="round"/>
    <circle cx="623" cy="379" r="6" fill="#f1c27d"/>
    <!-- head tilted up-left -->
    <circle cx="598" cy="314" r="13" fill="#f1c27d"/>
    <path d="M585,310 Q587,293 601,294 Q615,295 614,312 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="580" y="306" width="37" height="6" rx="3" transform="rotate(-8 598 309)" fill="#e8e4dc" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>
