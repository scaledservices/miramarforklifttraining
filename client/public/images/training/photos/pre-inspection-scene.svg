<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- wall -->
  <rect width="800" height="450" fill="#f2ede4"/>
  <rect x="0" y="0" width="800" height="24" fill="#e2dacb"/>
  <g stroke="#e5ddce" stroke-width="3">
    <line x1="160" y1="24" x2="160" y2="388"/>
    <line x1="360" y1="24" x2="360" y2="388"/>
    <line x1="560" y1="24" x2="560" y2="388"/>
  </g>
  <!-- morning windows -->
  <g>
    <rect x="36" y="40" width="88" height="38" rx="3" fill="#fdf3d2" stroke="#c9c2b4" stroke-width="2"/>
    <rect x="136" y="40" width="88" height="38" rx="3" fill="#fdf3d2" stroke="#c9c2b4" stroke-width="2"/>
    <rect x="236" y="40" width="88" height="38" rx="3" fill="#fdf3d2" stroke="#c9c2b4" stroke-width="2"/>
  </g>
  <!-- faint racking, right background -->
  <g>
    <rect x="620" y="110" width="9" height="278" fill="#d8cfbd"/>
    <rect x="720" y="110" width="9" height="278" fill="#d8cfbd"/>
    <rect x="792" y="110" width="8" height="278" fill="#d8cfbd"/>
    <rect x="620" y="196" width="180" height="7" fill="#d3c9b6"/>
    <rect x="620" y="288" width="180" height="7" fill="#d3c9b6"/>
    <rect x="632" y="222" width="38" height="66" fill="#e8dcc2"/>
    <rect x="676" y="238" width="36" height="50" fill="#e0d2b4"/>
    <rect x="734" y="228" width="40" height="60" fill="#e8dcc2"/>
    <rect x="634" y="126" width="40" height="70" fill="#e0d2b4"/>
    <rect x="732" y="140" width="42" height="56" fill="#e8dcc2"/>
    <rect x="632" y="322" width="42" height="66" fill="#e4d6bd"/>
    <rect x="732" y="334" width="44" height="54" fill="#ddccae"/>
  </g>

  <!-- floor -->
  <rect x="0" y="388" width="800" height="62" fill="#d8d2c6"/>
  <line x1="0" y1="388" x2="800" y2="388" stroke="#c2bbad" stroke-width="2"/>
  <line x1="0" y1="424" x2="800" y2="424" stroke="#c9c2b4" stroke-width="1.5"/>
  <line x1="180" y1="388" x2="168" y2="450" stroke="#c9c2b4" stroke-width="1.5"/>

  <!-- morning light rays -->
  <polygon points="60,78 210,78 420,450 150,450" fill="rgba(255,220,120,0.14)"/>
  <polygon points="250,78 330,78 560,450 420,450" fill="rgba(255,220,120,0.10)"/>

  <!-- ================= PARKED FORKLIFT (no operator) ================= -->
  <g transform="translate(10,80) scale(0.8)">
    <ellipse cx="400" cy="404" rx="270" ry="15" fill="rgba(0,0,0,0.12)"/>
    <path d="M150,350 L150,300 Q150,285 165,285 L230,285 L230,350 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="200" y="290" width="200" height="60" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="352" y="298" width="30" height="22" rx="2" fill="#f5f2ec" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="356" y1="304" x2="378" y2="304" stroke="#8a8378" stroke-width="1.5"/>
    <line x1="356" y1="309" x2="378" y2="309" stroke="#8a8378" stroke-width="1.5"/>
    <rect x="240" y="196" width="13" height="48" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="248" y="238" width="54" height="14" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M330,290 L330,255 Q330,248 337,248 L392,248 Q400,248 400,258 L400,290 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M340,250 L322,232" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="318" cy="228" r="9" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <circle cx="370" cy="352" r="48" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="370" cy="352" r="22" fill="#8a8378"/>
    <circle cx="370" cy="352" r="8" fill="#4a4540"/>
    <circle cx="212" cy="364" r="36" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="212" cy="364" r="16" fill="#8a8378"/>
    <circle cx="212" cy="364" r="6" fill="#4a4540"/>
    <line x1="222" y1="290" x2="228" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <line x1="352" y1="252" x2="342" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <rect x="212" y="136" width="146" height="12" rx="5" fill="#3d3d3d"/>
    <g stroke="#3d3d3d" stroke-width="4">
      <line x1="242" y1="140" x2="242" y2="147"/>
      <line x1="268" y1="140" x2="268" y2="147"/>
      <line x1="294" y1="140" x2="294" y2="147"/>
      <line x1="320" y1="140" x2="320" y2="147"/>
    </g>
    <rect x="398" y="300" width="38" height="26" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="432" y="118" width="13" height="274" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="455" y="118" width="13" height="274" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="2"/>
    <g stroke="#1a1a1a" stroke-width="2" fill="#555">
      <rect x="432" y="150" width="36" height="8"/>
      <rect x="432" y="230" width="36" height="8"/>
      <rect x="432" y="310" width="36" height="8"/>
    </g>
    <line x1="474" y1="130" x2="474" y2="240" stroke="#8a8378" stroke-width="3" stroke-dasharray="4 3"/>
    <g stroke="#1a1a1a" stroke-width="2">
      <rect x="478" y="228" width="12" height="152" fill="#777"/>
      <line x1="478" y1="256" x2="490" y2="256"/>
      <line x1="478" y1="284" x2="490" y2="284"/>
      <line x1="478" y1="312" x2="490" y2="312"/>
      <line x1="478" y1="340" x2="490" y2="340"/>
    </g>
    <path d="M490,262 L502,262 L502,384 L664,384 L664,396 L490,396 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- ================= CROUCHED OPERATOR inspecting forks ================= -->
  <g>
    <ellipse cx="610" cy="400" rx="52" ry="8" fill="rgba(0,0,0,0.12)"/>
    <!-- rear leg -->
    <path d="M638,346 L610,354 L614,390" fill="none" stroke="#333a45" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="600" y="388" width="24" height="10" rx="3" fill="#2b2b2b"/>
    <!-- front leg -->
    <path d="M642,342 L582,352 L586,390" fill="none" stroke="#3f4652" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="572" y="388" width="24" height="10" rx="3" fill="#2b2b2b"/>
    <!-- torso, leaning forward -->
    <path d="M604,290 L632,296 Q652,316 646,352 L612,346 Q594,318 604,290 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M612,296 Q604,320 616,342" fill="none" stroke="#ffe14d" stroke-width="5"/>
    <path d="M630,300 Q640,322 636,346" fill="none" stroke="#ffe14d" stroke-width="5"/>
    <!-- reaching arm to fork -->
    <path d="M612,302 L570,340 L550,378" fill="none" stroke="#e06f00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="548" cy="383" r="6" fill="#8d5524"/>
    <!-- clipboard arm -->
    <path d="M632,306 L654,330" stroke="#e06f00" stroke-width="10" stroke-linecap="round"/>
    <g transform="rotate(-12 660 342)">
      <rect x="644" y="320" width="34" height="46" rx="3" fill="#f5f2ec" stroke="#1a1a1a" stroke-width="2"/>
      <rect x="654" y="315" width="14" height="8" rx="2" fill="#8a8378" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="650" y1="334" x2="672" y2="334" stroke="#8a8378" stroke-width="2"/>
      <line x1="650" y1="343" x2="672" y2="343" stroke="#8a8378" stroke-width="2"/>
      <line x1="650" y1="352" x2="666" y2="352" stroke="#8a8378" stroke-width="2"/>
      <path d="M648,331 L651,335 L656,328" fill="none" stroke="#019E7C" stroke-width="2"/>
      <path d="M648,340 L651,344 L656,337" fill="none" stroke="#019E7C" stroke-width="2"/>
    </g>
    <circle cx="655" cy="332" r="6" fill="#8d5524"/>
    <!-- head, facing the forklift -->
    <circle cx="600" cy="272" r="13" fill="#8d5524"/>
    <path d="M586,270 Q586,252 600,252 Q615,252 615,270 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="580" y="266" width="38" height="6" rx="3" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- toolbox -->
  <g>
    <ellipse cx="724" cy="398" rx="46" ry="7" fill="rgba(0,0,0,0.12)"/>
    <rect x="684" y="366" width="80" height="28" rx="4" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2.5"/>
    <line x1="684" y1="376" x2="764" y2="376" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M712,366 L712,356 L736,356 L736,366" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <rect x="719" y="372" width="10" height="8" rx="2" fill="#1a1a1a"/>
  </g>
</svg>
