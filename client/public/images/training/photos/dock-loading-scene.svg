<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <!-- exterior backdrop -->
  <rect width="800" height="450" fill="#f4f0e8"/>
  <!-- ground -->
  <rect x="0" y="436" width="800" height="14" fill="#a8a296"/>
  <line x1="0" y1="436" x2="800" y2="436" stroke="#8f897c" stroke-width="2"/>

  <!-- ================= WAREHOUSE (cutaway, left) ================= -->
  <!-- interior -->
  <rect x="0" y="64" width="430" height="266" fill="#f0eadf"/>
  <!-- interior back wall detail + faint racking -->
  <g>
    <rect x="0" y="150" width="430" height="6" fill="#e2dbcb"/>
    <rect x="14" y="96" width="9" height="234" fill="#d3c9b8"/>
    <rect x="120" y="96" width="9" height="234" fill="#d3c9b8"/>
    <rect x="14" y="186" width="115" height="7" fill="#cfc5b3"/>
    <rect x="14" y="262" width="115" height="7" fill="#cfc5b3"/>
    <rect x="26" y="206" width="40" height="56" fill="#e4d6bd"/>
    <rect x="72" y="218" width="40" height="44" fill="#ddccae"/>
    <rect x="28" y="120" width="38" height="66" fill="#e4d6bd"/>
    <rect x="74" y="134" width="38" height="52" fill="#ddccae"/>
    <!-- interior ceiling light -->
    <line x1="230" y1="64" x2="230" y2="80" stroke="#b8ad9c" stroke-width="3"/>
    <rect x="186" y="80" width="88" height="11" rx="3" fill="#efe9dd" stroke="#b8ad9c" stroke-width="2"/>
    <rect x="190" y="87" width="80" height="4" fill="#ffe9a8"/>
  </g>
  <!-- roof band -->
  <rect x="0" y="46" width="430" height="18" fill="#6b5a4e"/>
  <line x1="0" y1="64" x2="430" y2="64" stroke="#4f3b3b" stroke-width="2"/>
  <!-- rolled-up dock door coil at opening -->
  <rect x="322" y="66" width="106" height="30" rx="6" fill="#9a9284" stroke="#6f695e" stroke-width="2"/>
  <line x1="322" y1="76" x2="428" y2="76" stroke="#867f71" stroke-width="2"/>
  <line x1="322" y1="86" x2="428" y2="86" stroke="#867f71" stroke-width="2"/>
  <!-- door frame column -->
  <rect x="420" y="64" width="14" height="266" fill="#b8ad9c" stroke="#9a9080" stroke-width="1.5"/>
  <!-- DOCK 3 sign -->
  <rect x="316" y="14" width="112" height="34" rx="4" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
  <text x="372" y="38" font-size="21" font-weight="700" fill="#FFC326" text-anchor="middle">DOCK 3</text>

  <!-- dock floor + foundation -->
  <rect x="0" y="330" width="434" height="14" fill="#c9c2b4"/>
  <line x1="0" y1="330" x2="434" y2="330" stroke="#a99f8d" stroke-width="2"/>
  <rect x="0" y="344" width="434" height="106" fill="#b8ad9c"/>
  <g stroke="#a3987f" stroke-width="2">
    <line x1="90" y1="344" x2="90" y2="450"/>
    <line x1="230" y1="344" x2="230" y2="450"/>
    <line x1="370" y1="344" x2="370" y2="450"/>
  </g>
  <!-- dock bumpers -->
  <rect x="416" y="352" width="18" height="40" rx="3" fill="#2b2b2b"/>
  <rect x="416" y="398" width="18" height="34" rx="3" fill="#2b2b2b"/>

  <!-- ================= TRAILER (right, cutaway) ================= -->
  <!-- shadow under trailer -->
  <rect x="440" y="430" width="340" height="8" fill="rgba(0,0,0,0.12)"/>
  <!-- interior -->
  <rect x="440" y="128" width="344" height="196" fill="#e9e2d4" stroke="#b3aa98" stroke-width="2"/>
  <g stroke="#dcd4c4" stroke-width="4">
    <line x1="500" y1="132" x2="500" y2="320"/>
    <line x1="560" y1="132" x2="560" y2="320"/>
    <line x1="620" y1="132" x2="620" y2="320"/>
    <line x1="680" y1="132" x2="680" y2="320"/>
    <line x1="740" y1="132" x2="740" y2="320"/>
  </g>
  <!-- roof -->
  <rect x="434" y="112" width="356" height="18" rx="4" fill="#cfc8ba" stroke="#a39a88" stroke-width="2"/>
  <!-- nose (closed front) -->
  <rect x="778" y="112" width="16" height="222" fill="#cfc8ba" stroke="#a39a88" stroke-width="2"/>
  <!-- wood floor -->
  <rect x="440" y="320" width="344" height="14" fill="#b09468" stroke="#8f7550" stroke-width="1.5"/>
  <!-- rear frame post -->
  <rect x="434" y="112" width="8" height="222" fill="#8a8378"/>
  <!-- boxes deep in trailer -->
  <rect x="694" y="262" width="52" height="58" fill="#c9a26b" stroke="#9c7847" stroke-width="1.5"/>
  <rect x="712" y="216" width="44" height="46" fill="#b8895a" stroke="#8f6a42" stroke-width="1.5"/>
  <rect x="750" y="276" width="26" height="44" fill="#d4b183" stroke="#9c7847" stroke-width="1.5"/>
  <!-- underside -->
  <rect x="446" y="334" width="332" height="44" fill="#4a4a4a"/>
  <!-- wheels -->
  <circle cx="640" cy="406" r="30" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="640" cy="406" r="12" fill="#8a8378"/>
  <circle cx="700" cy="406" r="30" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="700" cy="406" r="12" fill="#8a8378"/>
  <!-- wheel chocks -->
  <polygon points="604,436 632,436 632,412" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="614" y1="436" x2="626" y2="424" stroke="#ffd24d" stroke-width="3"/>
  <polygon points="736,436 708,436 708,412" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
  <!-- landing gear -->
  <rect x="752" y="358" width="10" height="70" fill="#6b6b6b" stroke="#4a4a4a" stroke-width="2"/>
  <rect x="744" y="426" width="26" height="8" rx="2" fill="#6b6b6b" stroke="#4a4a4a" stroke-width="2"/>

  <!-- dock plate bridging -->
  <polygon points="396,324 476,314 476,328 396,338" fill="#8a8378" stroke="#5f594f" stroke-width="2"/>
  <g stroke="#6f695e" stroke-width="2">
    <line x1="412" y1="322" x2="412" y2="334"/>
    <line x1="432" y1="320" x2="432" y2="332"/>
    <line x1="452" y1="318" x2="452" y2="330"/>
  </g>

  <!-- ================= FORKLIFT entering trailer ================= -->
  <g transform="translate(155,110) scale(0.55)">
    <ellipse cx="400" cy="404" rx="260" ry="16" fill="rgba(0,0,0,0.12)"/>
    <path d="M150,350 L150,300 Q150,285 165,285 L230,285 L230,350 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="200" y="290" width="200" height="60" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="240" y="196" width="13" height="48" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="248" y="238" width="54" height="14" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <!-- operator -->
    <path d="M270,244 L318,250 L330,280" fill="none" stroke="#3f4652" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M254,244 Q250,196 280,184 L302,188 Q312,216 306,246 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M266,240 Q264,204 282,190" fill="none" stroke="#ffe14d" stroke-width="5"/>
    <path d="M300,196 L296,242" stroke="#2b2b2b" stroke-width="6" stroke-linecap="round"/>
    <path d="M296,202 L318,226" stroke="#e06f00" stroke-width="9" stroke-linecap="round"/>
    <circle cx="320" cy="228" r="5" fill="#8d5524"/>
    <circle cx="290" cy="166" r="12" fill="#8d5524"/>
    <path d="M277,164 Q277,148 290,148 Q304,148 304,164 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="273" y="161" width="35" height="5" rx="2" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- hood -->
    <path d="M330,290 L330,255 Q330,248 337,248 L392,248 Q400,248 400,258 L400,290 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M340,250 L322,232" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="318" cy="228" r="9" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- wheels -->
    <circle cx="370" cy="352" r="48" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="370" cy="352" r="22" fill="#8a8378"/>
    <circle cx="370" cy="352" r="8" fill="#4a4540"/>
    <circle cx="212" cy="364" r="36" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="212" cy="364" r="16" fill="#8a8378"/>
    <circle cx="212" cy="364" r="6" fill="#4a4540"/>
    <!-- guard -->
    <line x1="222" y1="290" x2="228" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <line x1="352" y1="252" x2="342" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <rect x="212" y="136" width="146" height="12" rx="5" fill="#3d3d3d"/>
    <!-- mast -->
    <rect x="398" y="300" width="38" height="26" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="432" y="118" width="13" height="274" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="455" y="118" width="13" height="274" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="2"/>
    <g stroke="#1a1a1a" stroke-width="2" fill="#555">
      <rect x="432" y="150" width="36" height="8"/>
      <rect x="432" y="230" width="36" height="8"/>
      <rect x="432" y="310" width="36" height="8"/>
    </g>
    <line x1="474" y1="128" x2="474" y2="210" stroke="#8a8378" stroke-width="3" stroke-dasharray="4 3"/>
    <!-- carriage raised slightly for travel -->
    <g stroke="#1a1a1a" stroke-width="2">
      <rect x="478" y="198" width="12" height="152" fill="#777"/>
      <line x1="478" y1="226" x2="490" y2="226"/>
      <line x1="478" y1="254" x2="490" y2="254"/>
      <line x1="478" y1="282" x2="490" y2="282"/>
      <line x1="478" y1="310" x2="490" y2="310"/>
    </g>
    <path d="M490,232 L502,232 L502,354 L664,354 L664,366 L490,366 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <!-- pallet load -->
    <rect x="500" y="340" width="156" height="14" fill="#a67c4f" stroke="#7c5a36" stroke-width="1.5"/>
    <rect x="514" y="346" width="16" height="8" fill="#8f6a42"/>
    <rect x="566" y="346" width="16" height="8" fill="#8f6a42"/>
    <rect x="618" y="346" width="16" height="8" fill="#8f6a42"/>
    <rect x="504" y="278" width="72" height="62" fill="#c9a26b" stroke="#9c7847" stroke-width="1.5"/>
    <line x1="540" y1="278" x2="540" y2="340" stroke="#b18a52" stroke-width="3"/>
    <rect x="580" y="288" width="70" height="52" fill="#b8895a" stroke="#8f6a42" stroke-width="1.5"/>
    <rect x="520" y="238" width="52" height="40" fill="#d4b183" stroke="#9c7847" stroke-width="1.5"/>
  </g>

  <!-- ================= WORKER with clipboard ================= -->
  <g>
    <ellipse cx="104" cy="332" rx="30" ry="6" fill="rgba(0,0,0,0.12)"/>
    <path d="M96,288 L94,326" stroke="#3f4652" stroke-width="12" stroke-linecap="round"/>
    <path d="M112,288 L116,326" stroke="#3f4652" stroke-width="12" stroke-linecap="round"/>
    <rect x="86" y="322" width="17" height="8" rx="3" fill="#2b2b2b"/>
    <rect x="108" y="322" width="17" height="8" rx="3" fill="#2b2b2b"/>
    <path d="M90,240 L120,240 Q127,264 123,292 L86,292 Q82,264 90,240 Z" fill="#FF7F00" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="97" y1="242" x2="95" y2="290" stroke="#ffe14d" stroke-width="5"/>
    <line x1="113" y1="242" x2="115" y2="290" stroke="#ffe14d" stroke-width="5"/>
    <!-- arms holding clipboard -->
    <path d="M92,248 L76,268" stroke="#5a6470" stroke-width="9" stroke-linecap="round"/>
    <path d="M118,248 L132,266" stroke="#5a6470" stroke-width="9" stroke-linecap="round"/>
    <g transform="rotate(8 104 282)">
      <rect x="82" y="262" width="42" height="40" rx="3" fill="#f5f2ec" stroke="#1a1a1a" stroke-width="2"/>
      <rect x="96" y="257" width="16" height="9" rx="2" fill="#8a8378" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="90" y1="274" x2="118" y2="274" stroke="#8a8378" stroke-width="2"/>
      <line x1="90" y1="282" x2="118" y2="282" stroke="#8a8378" stroke-width="2"/>
      <line x1="90" y1="290" x2="110" y2="290" stroke="#8a8378" stroke-width="2"/>
    </g>
    <circle cx="79" cy="272" r="5.5" fill="#e0ac69"/>
    <circle cx="133" cy="270" r="5.5" fill="#e0ac69"/>
    <circle cx="105" cy="222" r="13" fill="#e0ac69"/>
    <path d="M91,220 Q91,202 105,202 Q120,202 120,220 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="87" y="216" width="37" height="6" rx="3" fill="#e0a800" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>
