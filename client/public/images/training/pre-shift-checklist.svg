<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <!-- background -->
  <rect width="800" height="450" fill="#faf8f5"/>
  <rect x="0" y="400" width="800" height="50" fill="#e8e2d8"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#b8ad9c" stroke-width="2"/>

  <text x="30" y="42" font-size="22" font-weight="700" fill="#4f3b3b">Pre-Shift Inspection Points</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- ===== forklift, shifted left for legend ===== -->
  <g transform="translate(-70,0)">
    <!-- counterweight -->
    <path d="M150,350 L150,300 Q150,285 165,285 L230,285 L230,350 Z" fill="#e0a800" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- body -->
    <rect x="200" y="290" width="200" height="60" rx="8" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- hood / dash console -->
    <path d="M330,290 L330,255 Q330,248 337,248 L392,248 Q400,248 400,258 L400,290 Z" fill="#FFC326" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- steering wheel -->
    <path d="M340,250 L322,232" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="318" cy="228" r="9" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- data plate -->
    <rect x="352" y="298" width="30" height="22" rx="2" fill="#f5f2ec" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="356" y1="304" x2="378" y2="304" stroke="#8a8378" stroke-width="1.5"/>
    <line x1="356" y1="309" x2="378" y2="309" stroke="#8a8378" stroke-width="1.5"/>
    <line x1="356" y1="314" x2="372" y2="314" stroke="#8a8378" stroke-width="1.5"/>

    <!-- overhead guard -->
    <line x1="222" y1="290" x2="228" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <line x1="352" y1="252" x2="342" y2="148" stroke="#3d3d3d" stroke-width="9" stroke-linecap="round"/>
    <rect x="212" y="136" width="146" height="12" rx="5" fill="#3d3d3d"/>
    <g stroke="#3d3d3d" stroke-width="4">
      <line x1="242" y1="140" x2="242" y2="147"/>
      <line x1="268" y1="140" x2="268" y2="147"/>
      <line x1="294" y1="140" x2="294" y2="147"/>
      <line x1="320" y1="140" x2="320" y2="147"/>
    </g>

    <!-- seat -->
    <rect x="248" y="238" width="54" height="14" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="240" y="196" width="13" height="48" rx="5" fill="#4f3b3b" stroke="#1a1a1a" stroke-width="2"/>

    <!-- wheels -->
    <circle cx="370" cy="352" r="48" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="370" cy="352" r="22" fill="#8a8378"/>
    <circle cx="370" cy="352" r="8" fill="#4a4540"/>
    <circle cx="212" cy="364" r="36" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="212" cy="364" r="16" fill="#8a8378"/>
    <circle cx="212" cy="364" r="6" fill="#4a4540"/>

    <!-- mast carriage link to chassis -->
    <rect x="398" y="300" width="38" height="26" rx="4" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>
    <!-- mast -->
    <rect x="432" y="118" width="13" height="274" fill="#555" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="455" y="118" width="13" height="274" fill="#6b6b6b" stroke="#1a1a1a" stroke-width="2"/>
    <g stroke="#1a1a1a" stroke-width="2" fill="#555">
      <rect x="432" y="150" width="36" height="8"/>
      <rect x="432" y="230" width="36" height="8"/>
      <rect x="432" y="310" width="36" height="8"/>
    </g>
    <!-- lift chain hint -->
    <line x1="474" y1="130" x2="474" y2="240" stroke="#8a8378" stroke-width="3" stroke-dasharray="4 3"/>

    <!-- load backrest -->
    <g stroke="#1a1a1a" stroke-width="2">
      <rect x="478" y="228" width="12" height="152" fill="#777"/>
      <line x1="478" y1="256" x2="490" y2="256"/>
      <line x1="478" y1="284" x2="490" y2="284"/>
      <line x1="478" y1="312" x2="490" y2="312"/>
      <line x1="478" y1="340" x2="490" y2="340"/>
    </g>

    <!-- forks -->
    <path d="M490,262 L502,262 L502,384 L664,384 L664,396 L490,396 Z" fill="#3d3d3d" stroke="#1a1a1a" stroke-width="2"/>

    <!-- ===== numbered inspection markers ===== -->
    <g font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">
      <!-- 1 tires/wheels -->
      <circle cx="212" cy="364" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="212" y="369">1</text>
      <!-- 2 forks heel/tips -->
      <circle cx="560" cy="390" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="560" y="395">2</text>
      <!-- 3 mast + lift chains -->
      <circle cx="450" cy="176" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="450" y="181">3</text>
      <!-- 4 hydraulic area under body -->
      <circle cx="286" cy="356" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="286" y="361">4</text>
      <!-- 5 overhead guard -->
      <circle cx="285" cy="142" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="285" y="147">5</text>
      <!-- 6 data plate -->
      <circle cx="367" cy="309" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="367" y="314">6</text>
      <!-- 7 seat + seat belt -->
      <circle cx="271" cy="240" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="271" y="245">7</text>
      <!-- 8 horn/lights on dash -->
      <circle cx="374" cy="264" r="13" fill="#FF7F00" stroke="#ffffff" stroke-width="2"/>
      <text x="374" y="269">8</text>
    </g>
  </g>

  <!-- ===== legend ===== -->
  <g>
    <rect x="612" y="88" width="176" height="298" rx="10" fill="#ffffff" stroke="#b8ad9c" stroke-width="1.5"/>
    <text x="630" y="116" font-size="14" font-weight="700" fill="#4f3b3b">Check every shift</text>
    <line x1="630" y1="126" x2="770" y2="126" stroke="#e8e2d8" stroke-width="2"/>
    <g font-size="13" font-weight="600" fill="#1a1a1a">
      <circle cx="640" cy="146" r="10" fill="#FF7F00"/>
      <text x="640" y="150" text-anchor="middle" fill="#ffffff" font-weight="700">1</text>
      <text x="658" y="150">Tires &amp; wheels</text>

      <circle cx="640" cy="176" r="10" fill="#FF7F00"/>
      <text x="640" y="180" text-anchor="middle" fill="#ffffff" font-weight="700">2</text>
      <text x="658" y="180">Forks &amp; heels</text>

      <circle cx="640" cy="206" r="10" fill="#FF7F00"/>
      <text x="640" y="210" text-anchor="middle" fill="#ffffff" font-weight="700">3</text>
      <text x="658" y="210">Mast &amp; chains</text>

      <circle cx="640" cy="236" r="10" fill="#FF7F00"/>
      <text x="640" y="240" text-anchor="middle" fill="#ffffff" font-weight="700">4</text>
      <text x="658" y="240">Hydraulics &amp; leaks</text>

      <circle cx="640" cy="266" r="10" fill="#FF7F00"/>
      <text x="640" y="270" text-anchor="middle" fill="#ffffff" font-weight="700">5</text>
      <text x="658" y="270">Overhead guard</text>

      <circle cx="640" cy="296" r="10" fill="#FF7F00"/>
      <text x="640" y="300" text-anchor="middle" fill="#ffffff" font-weight="700">6</text>
      <text x="658" y="300">Data plate</text>

      <circle cx="640" cy="326" r="10" fill="#FF7F00"/>
      <text x="640" y="330" text-anchor="middle" fill="#ffffff" font-weight="700">7</text>
      <text x="658" y="330">Seat belt</text>

      <circle cx="640" cy="356" r="10" fill="#FF7F00"/>
      <text x="640" y="360" text-anchor="middle" fill="#ffffff" font-weight="700">8</text>
      <text x="658" y="360">Horn &amp; lights</text>
    </g>
  </g>
</svg>
