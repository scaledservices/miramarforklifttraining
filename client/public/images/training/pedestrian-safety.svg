<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Roboto, Arial, sans-serif">
  <rect width="800" height="450" fill="#faf8f5"/>
  <defs>
    <pattern id="greenHatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#ffffff"/>
      <rect width="5" height="10" fill="#019E7C"/>
    </pattern>
    <marker id="dimArrP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4f3b3b"/>
    </marker>
  </defs>

  <text x="30" y="42" font-size="22" font-weight="700" fill="#4f3b3b">Blind Spots &amp; Pedestrian Zones</text>
  <rect x="30" y="52" width="64" height="4" fill="#FFC326"/>

  <!-- Blind spot cones -->
  <polygon points="320,235 240,70 400,70" fill="#d64545" fill-opacity="0.18" stroke="#d64545" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="320,300 235,432 405,432" fill="#d64545" fill-opacity="0.18" stroke="#d64545" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Forklift, top-down -->
  <g>
    <rect x="278" y="90" width="14" height="80" rx="4" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="348" y="90" width="14" height="80" rx="4" fill="#FFC326" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="264" y="163" width="112" height="12" rx="3" fill="#e0a800" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="250" y="170" width="140" height="150" rx="14" fill="#ffd75e" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="260" y="278" width="120" height="36" rx="10" fill="#e0a800" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="228" y="176" width="20" height="44" rx="7" fill="#1a1a1a"/>
    <rect x="392" y="176" width="20" height="44" rx="7" fill="#1a1a1a"/>
    <rect x="285" y="296" width="70" height="10" rx="5" fill="#4f3b3b"/>
    <circle cx="320" cy="301" r="6" fill="#4f3b3b"/>
  </g>

  <!-- Pedestrian walkway -->
  <rect x="565" y="64" width="120" height="321" fill="#eef7f3"/>
  <rect x="565" y="64" width="14" height="321" fill="url(#greenHatch)" stroke="#019E7C" stroke-width="1.5"/>
  <rect x="671" y="64" width="14" height="321" fill="url(#greenHatch)" stroke="#019E7C" stroke-width="1.5"/>

  <!-- Pedestrian figure (walking) -->
  <g stroke-linecap="round">
    <circle cx="615" cy="205" r="11" fill="#4f3b3b"/>
    <rect x="603" y="220" width="24" height="42" rx="11" fill="#4f3b3b"/>
    <line x1="612" y1="258" x2="601" y2="296" stroke="#4f3b3b" stroke-width="7"/>
    <line x1="618" y1="258" x2="630" y2="293" stroke="#4f3b3b" stroke-width="7"/>
    <line x1="606" y1="228" x2="596" y2="252" stroke="#4f3b3b" stroke-width="6"/>
    <line x1="624" y1="228" x2="634" y2="250" stroke="#4f3b3b" stroke-width="6"/>
  </g>

  <!-- Green check next to pedestrian -->
  <circle cx="656" cy="228" r="13" fill="#019E7C"/>
  <path d="M649 228 l5 6 l10 -12" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="615" y="410" font-size="15" font-weight="600" fill="#019E7C" text-anchor="middle">Pedestrians have</text>
  <text x="615" y="430" font-size="15" font-weight="600" fill="#019E7C" text-anchor="middle">right of way</text>

  <!-- Separation arrow -->
  <line x1="420" y1="245" x2="558" y2="245" stroke="#4f3b3b" stroke-width="2" marker-start="url(#dimArrP)" marker-end="url(#dimArrP)"/>
  <text x="487" y="215" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">Keep 10 ft</text>
  <text x="487" y="233" font-size="15" font-weight="600" fill="#1a1a1a" text-anchor="middle">separation</text>

  <!-- Label: Blind spots (front cone) -->
  <circle cx="262" cy="118" r="3.5" fill="#FF7F00"/>
  <line x1="262" y1="118" x2="160" y2="102" stroke="#4f3b3b" stroke-width="1.5"/>
  <text x="154" y="106" font-size="15" font-weight="600" fill="#d64545" text-anchor="end">Blind spots</text>

  <!-- Label: Blind spots (rear cone) -->
  <circle cx="266" cy="400" r="3.5" fill="#FF7F00"/>
  <line x1="266" y1="400" x2="166" y2="418" stroke="#4f3b3b" stroke-width="1.5"/>
  <text x="160" y="422" font-size="15" font-weight="600" fill="#d64545" text-anchor="end">Blind spots</text>

  <!-- Label: Sound horn -->
  <circle cx="250" cy="232" r="3.5" fill="#FF7F00"/>
  <line x1="250" y1="232" x2="146" y2="300" stroke="#4f3b3b" stroke-width="1.5"/>
  <text x="42" y="318" font-size="15" font-weight="600" fill="#1a1a1a">Sound horn at</text>
  <text x="42" y="338" font-size="15" font-weight="600" fill="#1a1a1a">intersections</text>
</svg>
