<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#4f3b3b"/>
  <rect x="50" y="50" width="700" height="300" fill="#5d4646" rx="12"/>
  <!-- Boom lift silhouette -->
  <rect x="150" y="280" width="120" height="40" fill="#FFC326" rx="4"/>
  <rect x="170" y="250" width="15" height="30" fill="#FFC326"/>
  <rect x="190" y="200" width="10" height="50" fill="#FFC326"/>
  <rect x="200" y="140" width="80" height="60" fill="#019E7C" rx="4"/>
