  <text x="400" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFC326">Aerial Lift Certification</text>
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">OSHA 29 CFR 1926.453 + ANSI A92</text>
